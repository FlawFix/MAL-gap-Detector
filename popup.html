<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="Icons/128px.png" alt="MAL Gap Detector" class="logo">
    <h1>MAL Gap Detector</h1>
  </header>

  <div id="controls">
    <div class="control-row">
      <label for="minGap">Min gap (days)</label>
      <input type="number" id="minGap" value="1" min="0" step="1">
    </div>
    <div class="control-row">
      <label for="sortBy">Sort by</label>
      <select id="sortBy">
        <option value="chronological">Chronological</option>
        <option value="gap-desc">Largest gap first</option>
        <option value="gap-asc">Smallest gap first</option>
      </select>
    </div>
  </div>

  <div id="actions">
    <button id="analyze">
      <span class="btn-text">Analyze</span>
      <span class="spinner hidden"></span>
    </button>
    <button id="download" disabled>Download .md</button>
  </div>

  <div id="status" class="hidden"></div>

  <div id="summary" class="hidden">
    <span id="totalEntries"></span>
    <span id="largestGap"></span>
    <span id="avgGap"></span>
  </div>

  <pre id="output"></pre>

  <!-- ── Rating Calculator ─────────────────────────────── -->
  <div id="rating-divider"></div>

  <h2 id="calc-heading">Rating Calculator</h2>

  <div id="rating-inputs">
    <div class="rating-field">
      <label for="rStory">Story</label>
      <input type="number" id="rStory" min="0" max="10" step="1" placeholder="0–10">
    </div>
    <div class="rating-field">
      <label for="rCharacter">Character</label>
      <input type="number" id="rCharacter" min="0" max="10" step="1" placeholder="0–10">
    </div>
    <div class="rating-field">
      <label for="rAnimation">Animation</label>
      <input type="number" id="rAnimation" min="0" max="10" step="1" placeholder="0–10">
    </div>
    <div class="rating-field">
      <label for="rSound">Sound</label>
      <input type="number" id="rSound" min="0" max="10" step="1" placeholder="0–10">
    </div>
    <div class="rating-field">
      <label for="rEnjoyment">Enjoyment</label>
      <input type="number" id="rEnjoyment" min="0" max="10" step="1" placeholder="0–10">
    </div>
  </div>

  <button id="calcRating">Calculate Rating</button>

  <div id="rating-result" class="hidden">
    <div id="rating-main">
      <span id="ratingValue">—</span>
      <span id="ratingLabel">/ 10</span>
    </div>
    <span id="ratingActual"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
